<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CashForecast — Transactions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo brand-word">CashF<span class="coin-o"><span class="coin-inner">₹</span></span>recast</div>
      <nav class="sidebar-nav">
        <a class="nav-link" href="/dashboard.html"><i data-feather="home"></i> Dashboard</a>
        <a class="nav-link" href="/investments.html"><i data-feather="pie-chart"></i> Investments</a>
        <a class="nav-link" href="/insurance.html"><i data-feather="shield"></i> Protection</a>
        <a class="nav-link active" href="/transactions.html"><i data-feather="list"></i> Transactions</a>
        <a class="nav-link" href="/settings.html"><i data-feather="settings"></i> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="topbar">
        <div>
          <div class="text-muted">Full searchable ledger</div>
          <h1 style="margin:0.35rem 0 0;">Transactions</h1>
        </div>
        <button class="primary-btn" id="export-btn">Export CSV</button>
      </div>
      <section class="glass-card panel-card">
        <div class="filter-bar">
          <input class="form-input" id="search-input" placeholder="Search merchant or category" />
          <select class="form-select" id="bank-filter"></select>
          <select class="form-select" id="category-filter"></select>
          <input class="form-input" id="min-amount" type="number" placeholder="Min amount" />
          <input class="form-input" id="max-amount" type="number" placeholder="Max amount" />
          <label class="pill" style="display:flex; align-items:center; justify-content:center; gap:0.5rem;"><input type="checkbox" id="anomaly-only" /> Anomaly only</label>
        </div>
      </section>
      <section class="glass-card panel-card table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Bank</th>
              <th>Description</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Balance</th>
              <th>Anomaly</th>
            </tr>
          </thead>
          <tbody id="txn-table-body"></tbody>
        </table>
      </section>
      <section class="glass-card panel-card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap;">
          <div class="text-muted" id="pagination-label">Page 1</div>
          <div style="display:flex; gap:0.75rem;">
            <button class="secondary-btn" id="prev-page">Previous</button>
            <button class="secondary-btn" id="next-page">Next</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="{{ url_for('static', filename='js/transactions.js') }}"></script>
</body>
</html>
